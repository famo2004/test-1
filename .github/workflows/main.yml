name: Update FaMo V2Ray Configs

on:
  schedule:
    - cron: '*/30 * * * *' # اجرای خودکار هر ۳۰ دقیقه
  workflow_dispatch: # امکان اجرای دستی ورک‌فلو از پنل گیت‌هاب

jobs:
  update-configs:
    runs-on: ubuntu-latest
    permissions:
      contents: write # دسترسی لازم برای پوش کردن فایل تغییر یافته

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run Extractor Script
        run: python extractor.py

      - name: Commit and Push Changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add famo_configs.json
          # بررسی اینکه آیا تغییری در فایل رخ داده است یا خیر. اگر تغییر کرده بود، پوش می‌کند.
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update FaMo Vless WS configs" && git push)
